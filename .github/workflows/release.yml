name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: jackdaw-linux-x86_64
          - os: macos-latest
            target: macos
            artifact: jackdaw-darwin-aarch64
          - os: windows-latest
            target: windows
            artifact: jackdaw-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci
      - run: npm run tauri build

      - name: Rename binary (Linux)
        if: matrix.target == 'linux'
        run: cp src-tauri/target/release/jackdaw ${{ matrix.artifact }}

      - name: Rename binary (macOS)
        if: matrix.target == 'macos'
        run: cp src-tauri/target/release/jackdaw ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.target == 'windows'
        run: cp src-tauri/target/release/jackdaw.exe ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  install-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload install script
        uses: softprops/action-gh-release@v2
        with:
          files: install.sh
